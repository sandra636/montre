<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Essayage Virtuel de Montre</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --gold: #c9a84c;
            --dark: #0a0a0f;
            --surface: #12121a;
            --text: #f0ede6;
            --muted: #888
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden
        }

        header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 168, 76, 0.15)
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 4px
        }

        header p {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em
        }

        .ar-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 16px auto;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 3/4;
            border: 1px solid rgba(201, 168, 76, 0.25)
        }

        #video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        #three-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none
        }

        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 16px;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9), transparent);
            display: flex;
            align-items: center;
            gap: 8px
        }

        #dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.3s;
            flex-shrink: 0
        }

        #dot.on {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80
        }

        #msg {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.9)
        }

        #switchBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center
        }

        #loadBox {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: rgba(10, 10, 15, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px
        }

        .spin {
            width: 38px;
            height: 38px;
            border: 2px solid rgba(201, 168, 76, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: sp 0.9s linear infinite
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        #loadTxt {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em
        }

        #startBox {
            position: absolute;
            inset: 0;
            z-index: 30;
            background: rgba(10, 10, 15, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 24px;
            text-align: center;
            transition: opacity 0.4s
        }

        #startBox.gone {
            opacity: 0;
            pointer-events: none
        }

        #startBox h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--gold)
        }

        #startBox p {
            font-size: 0.78rem;
            color: var(--muted);
            max-width: 200px;
            line-height: 1.5
        }

        #startBtn {
            padding: 12px 28px;
            background: var(--gold);
            color: #0a0a0f;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer
        }

        #startErr {
            font-size: 0.73rem;
            color: #e63946;
            min-height: 18px;
            max-width: 220px;
            line-height: 1.5
        }

        .sel {
            max-width: 480px;
            margin: 0 auto 24px;
            padding: 0 14px
        }

        .sel-lbl {
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 13px;
            padding: 14px 8px 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s
        }

        .card.active {
            border-color: rgba(201, 168, 76, 0.5);
            box-shadow: 0 0 18px rgba(201, 168, 76, 0.15)
        }

        .card svg {
            width: 52px;
            height: 62px
        }

        .cname {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            color: var(--text);
            margin-top: 8px
        }

        .csub {
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 2px
        }

        .adot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            margin: 5px auto 0;
            opacity: 0
        }

        .card.active .adot {
            opacity: 1
        }

        .hint {
            max-width: 480px;
            margin: 0 auto 36px;
            padding: 14px 18px;
            background: var(--surface);
            border-radius: 12px;
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.6;
            text-align: center
        }

        .hint strong {
            color: var(--text)
        }
    </style>
</head>

<body>

    <header>
        <h1>✦ Essai Virtuel</h1>
        <p>Essayez nos montres en temps réel</p>
    </header>

    <div class="ar-wrapper" id="arWrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="three-canvas"></canvas>

        <div id="loadBox" style="display:none">
            <div class="spin"></div>
            <div id="loadTxt">Chargement…</div>
        </div>

        <div id="startBox">
            <div style="font-size:2.2rem">📷</div>
            <h2>Activer la caméra</h2>
            <p>Appuyez pour démarrer l'essayage virtuel</p>
            <button id="startBtn">Démarrer</button>
            <div id="startErr"></div>
        </div>

        <div class="status-bar">
            <div id="dot"></div>
            <span id="msg">Montrez votre poignet à la caméra</span>
        </div>

        <button id="switchBtn">🔄</button>
    </div>

    <div class="sel">
        <div class="sel-lbl">Choisissez votre modèle</div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="hint">
        <strong>Comment utiliser</strong><br>
        Pointez la caméra vers votre poignet, paume vers le bas.<br>
        La montre se place automatiquement.
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        // ── MONTRES ──
        const WATCHES = [
            {
                name: 'Classique Or', sub: 'Gold · Round',
                c: { body: '#c9a84c', face: '#f5f0e8', bezel: '#a8892f', strap: '#3d2b1f' }, shape: 'round'
            },
            {
                name: 'Sport Noir', sub: 'Black · Square',
                c: { body: '#2a2a2a', face: '#111', bezel: '#444', strap: '#111' }, shape: 'square'
            },
            {
                name: 'Élégance Rose', sub: 'Rosé · Round',
                c: { body: '#b76e79', face: '#fff5f5', bezel: '#9d5560', strap: '#6b2d35' }, shape: 'round'
            }
        ];

        let curIdx = 0, lastIdx = 0;

        function svg(w) {
            const c = w.c;
            if (w.shape === 'square') return `<svg viewBox="0 0 56 70">
    <rect x="22" y="0"  width="12" height="14" rx="3" fill="${c.strap}"/>
    <rect x="22" y="56" width="12" height="14" rx="3" fill="${c.strap}"/>
    <rect x="7"  y="12" width="42" height="44" rx="5" fill="${c.bezel}"/>
    <rect x="10" y="15" width="36" height="38" rx="3" fill="${c.face}"/>
    <circle cx="28" cy="34" r="2" fill="${c.body}"/>
    <line x1="28" y1="34" x2="28" y2="23" stroke="${c.body}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="34" x2="35" y2="29" stroke="${c.body}" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`;
            return `<svg viewBox="0 0 56 70">
    <rect x="22" y="0"  width="12" height="14" rx="3" fill="${c.strap}"/>
    <rect x="22" y="56" width="12" height="14" rx="3" fill="${c.strap}"/>
    <circle cx="28" cy="34" r="21" fill="${c.bezel}"/>
    <circle cx="28" cy="34" r="17" fill="${c.face}"/>
    <circle cx="28" cy="34" r="2"  fill="${c.body}"/>
    <line x1="28" y1="34" x2="28" y2="19" stroke="${c.body}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="34" x2="37" y2="29" stroke="${c.body}" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`;
        }

        const gridEl = document.getElementById('grid');
        WATCHES.forEach((w, i) => {
            const d = document.createElement('div');
            d.className = 'card' + (i === 0 ? ' active' : '');
            d.innerHTML = `${svg(w)}<div class="cname">${w.name}</div><div class="csub">${w.sub}</div><div class="adot"></div>`;
            d.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                d.classList.add('active'); curIdx = i;
            };
            gridEl.appendChild(d);
        });

        // ── THREE.JS ──
        const canvas = document.getElementById('three-canvas');
        const rdr = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        rdr.setPixelRatio(devicePixelRatio);
        rdr.setClearColor(0, 0);

        const scene = new THREE.Scene();
        const cam3 = new THREE.PerspectiveCamera(55, 1, 0.01, 100);
        cam3.position.z = 5;

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const dl = new THREE.DirectionalLight(0xfff8e0, 1.3); dl.position.set(3, 5, 4); scene.add(dl);
        const pl = new THREE.PointLight(0xffffff, 0.5); pl.position.set(-3, 0, 3); scene.add(pl);

        let wObj = null;

        function buildWatch(w) {
            if (wObj) { scene.remove(wObj); wObj = null; }
            const c = w.c, g = new THREE.Group();
            const M = (col, met, rou) => new THREE.MeshStandardMaterial({ color: col, metalness: met, roughness: rou });

            if (w.shape === 'square') {
                // Boitier carré
                g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.28), M(c.bezel, 0.9, 0.15))));
                const face = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 0.02), M(c.face, 0, 0.5));
                face.position.z = 0.14; g.add(face);
            } else {
                // Boitier rond
                const bz = new THREE.Mesh(new THREE.CylinderGeometry(0.62, 0.62, 0.26, 64), M(c.bezel, 0.9, 0.12));
                bz.rotation.x = Math.PI / 2; g.add(bz);
                const face = new THREE.Mesh(new THREE.CircleGeometry(0.54, 64), M(c.face, 0, 0.5));
                face.position.z = 0.14; g.add(face);
                // Couronne
                const cr = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.2, 12), M(c.body, 0.8, 0.2));
                cr.rotation.z = Math.PI / 2; cr.position.x = 0.7; g.add(cr);
            }

            // Bracelets
            const sm = M(c.strap, 0.05, 0.85);
            const st = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.1, 0.12), sm);
            st.position.y = 1.05; g.add(st);
            const sb = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.1, 0.12), sm);
            sb.position.y = -1.05; g.add(sb);

            // Aiguilles
            const hm = M(c.body, 0.6, 0.3);
            const h1 = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.32, 0.045), hm);
            h1.position.set(-0.05, 0.13, 0.15); g.add(h1);
            const h2 = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.44, 0.035), hm);
            h2.position.set(0.06, 0.19, 0.15); g.add(h2);
            const h3 = new THREE.Mesh(new THREE.BoxGeometry(0.022, 0.48, 0.022), M('#e63946', 0.3, 0.5));
            h3.position.z = 0.155; g.add(h3);
            // Centre
            const cc = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.07, 16), M(c.body, 0.7, 0.2));
            cc.rotation.x = Math.PI / 2; cc.position.z = 0.15; g.add(cc);

            wObj = g; scene.add(g);
        }
        buildWatch(WATCHES[0]);

        // ── RESIZE ──
        let AW = 480, AH = 640;
        function resize() {
            const wrap = document.getElementById('arWrap');
            AW = wrap.clientWidth; AH = wrap.clientHeight;
            rdr.setSize(AW, AH);
            cam3.aspect = AW / AH; cam3.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        setTimeout(resize, 80);

        // ── MEDIAPIPE → SCÈNE 3D ──
        // Pour caméra arrière (environment) : pas de miroir CSS
        // x MediaPipe va de gauche (0) à droite (1), caméra arrière = pas inversé
        function lmTo3d(lm, front) {
            const aspect = AW / AH;
            const x = front ? (0.5 - lm.x) * aspect * 4 : (lm.x - 0.5) * aspect * 4;
            const y = (0.5 - lm.y) * 4;
            const z = -lm.z * 5;
            return { x, y, z };
        }

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.55 });

        let lms = null;
        hands.onResults(r => {
            if (r.multiHandLandmarks && r.multiHandLandmarks.length > 0) {
                lms = r.multiHandLandmarks[0];
                document.getElementById('dot').classList.add('on');
                document.getElementById('msg').textContent = '⌚ Montre sur votre poignet';
            } else {
                lms = null;
                document.getElementById('dot').classList.remove('on');
                document.getElementById('msg').textContent = 'Montrez votre poignet à la caméra';
            }
        });

        // ── ANIMATION ──
        function tick() {
            requestAnimationFrame(tick);

            if (curIdx !== lastIdx) { lastIdx = curIdx; buildWatch(WATCHES[curIdx]); }

            if (lms && wObj) {
                const front = curFacing === 'user';
                const W = lmTo3d(lms[0], front);   // poignet
                const I = lmTo3d(lms[5], front);   // index MCP
                const P = lmTo3d(lms[17], front);  // auriculaire MCP
                const M = lmTo3d(lms[9], front);   // majeur MCP

                // Position : entre poignet et base des doigts (30% vers les doigts)
                wObj.position.set(
                    W.x * 0.7 + M.x * 0.3,
                    W.y * 0.7 + M.y * 0.3,
                    W.z * 0.7 + M.z * 0.3
                );

                // Taille selon largeur du poignet
                const pw = Math.hypot(I.x - P.x, I.y - P.y);
                const sc = Math.max(0.2, Math.min(1.4, pw * 1.05));
                wObj.scale.setScalar(sc);

                // Rotation : axe poignet → doigts
                const dx = M.x - W.x, dy = M.y - W.y;
                wObj.rotation.set(Math.PI / 2, 0, Math.atan2(dy, dx) - Math.PI / 2);

                // Tilt latéral selon inclinaison de la main
                const tilt = (lms[5].y - lms[17].y) * 1.8;
                wObj.rotation.y = front ? tilt : -tilt;

                // Aiguille des secondes
                const sh = wObj.children[7];
                if (sh) sh.rotation.z = -(Date.now() / 1000 % 60) * (Math.PI * 2 / 60);

                wObj.visible = true;
            } else if (wObj) {
                wObj.visible = false;
            }

            rdr.render(scene, cam3);
        }
        tick();

        // ── CAMÉRA ──
        let curFacing = 'environment', curStream = null, mpCam = null;
        const vid = document.getElementById('video');

        async function startCam(facing) {
            if (mpCam) { try { mpCam.stop(); } catch (e) { } mpCam = null; }
            if (curStream) { curStream.getTracks().forEach(t => t.stop()); curStream = null; }

            document.getElementById('loadBox').style.display = 'flex';
            document.getElementById('loadTxt').textContent = 'Connexion caméra…';

            try {
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: facing }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false
                    });
                } catch (e) {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false
                    });
                }

                vid.srcObject = stream; curStream = stream;
                // Miroir uniquement pour caméra frontale
                vid.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                await new Promise(res => { vid.onloadedmetadata = res; setTimeout(res, 3000); });
                await vid.play();
                resize();

                mpCam = new Camera(vid, {
                    onFrame: async () => { await hands.send({ image: vid }); },
                    width: 1280, height: 720
                });
                await mpCam.start();

                document.getElementById('loadBox').style.display = 'none';
                curFacing = facing;
                return true;
            } catch (err) {
                console.error(err);
                document.getElementById('loadBox').style.display = 'none';
                return false;
            }
        }

        // Bouton switch caméra
        document.getElementById('switchBtn').onclick = async () => {
            const next = curFacing === 'environment' ? 'user' : 'environment';
            const ok = await startCam(next);
            if (!ok) await startCam(curFacing);
        };

        // Bouton démarrer
        document.getElementById('startBtn').onclick = async () => {
            const btn = document.getElementById('startBtn');
            const err = document.getElementById('startErr');
            err.textContent = ''; btn.textContent = 'Connexion…'; btn.disabled = true;

            if (!navigator.mediaDevices?.getUserMedia) {
                err.textContent = '⚠️ Utilisez Chrome ou Safari récent.';
                btn.textContent = 'Démarrer'; btn.disabled = false; return;
            }

            // Priorité caméra ARRIÈRE
            let ok = await startCam('environment');
            if (!ok) ok = await startCam('user');

            if (ok) {
                document.getElementById('startBox').classList.add('gone');
            } else {
                err.textContent = '❌ Permission refusée. Autorisez la caméra dans les paramètres Chrome.';
                btn.textContent = 'Réessayer'; btn.disabled = false;
            }
        };
    </script>
</body>

</html>
